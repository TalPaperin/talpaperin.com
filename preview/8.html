<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>8 · Dashboard · Hero Preview | Tal Paperin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/preview/shared.css" />
  <style>
    .bg{position:fixed;inset:0;z-index:0;background:radial-gradient(120% 100% at 74% 40%,#0b1626 0%,#06080c 60%)}
    .v8 .photo-wrap{width:46%;right:2%}
    .v8 .fade{background:linear-gradient(90deg,#06080c 26%,rgba(6,8,12,.45) 52%,transparent 78%)}
    .widget{position:absolute;z-index:5;background:rgba(10,17,28,.85);backdrop-filter:blur(8px);border:1px solid rgba(90,176,255,.28);border-radius:14px;padding:15px 17px;box-shadow:0 22px 54px rgba(0,0,0,.55);font:600 12px/1.3 'Space Grotesk';color:#cfe7ff}
    .widget .k{font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:#7fa6c8}
    .w1{right:30%;top:16%;width:250px;animation:bob 6s ease-in-out infinite}
    .w2{right:6%;top:40%;width:210px;animation:bob 7s ease-in-out infinite .4s}
    .w3{right:24%;bottom:12%;width:230px;animation:bob 5.5s ease-in-out infinite .2s}
    @keyframes bob{0%,100%{transform:translateY(-6px)}50%{transform:translateY(6px)}}
    .bars{display:flex;align-items:flex-end;gap:7px;height:78px;margin-top:12px}
    .bars i{flex:1;background:linear-gradient(180deg,#5ab0ff,#1f6fb2);border-radius:4px 4px 0 0;animation:grow 3.2s ease-in-out infinite}
    .bars i:nth-child(1){--h:62%;animation-delay:0s}.bars i:nth-child(2){--h:80%;animation-delay:.25s}.bars i:nth-child(3){--h:54%;animation-delay:.5s}.bars i:nth-child(4){--h:92%;animation-delay:.75s}.bars i:nth-child(5){--h:74%;animation-delay:1s}
    @keyframes grow{0%,100%{height:18%}50%{height:var(--h,80%)}}
    .funnel{display:grid;gap:6px;margin-top:12px}
    .funnel div{height:18px;border-radius:4px;background:rgba(90,176,255,.18);overflow:hidden;position:relative}
    .funnel div::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,#1f6fb2,#3f97e6);transform-origin:left;transform:scaleX(0);animation:ff 3.5s ease-in-out infinite}
    .funnel div:nth-child(1){width:100%}.funnel div:nth-child(2){width:78%}.funnel div:nth-child(3){width:54%}.funnel div:nth-child(4){width:32%}
    .funnel div:nth-child(2)::after{animation-delay:.2s}.funnel div:nth-child(3)::after{animation-delay:.4s}.funnel div:nth-child(4)::after{animation-delay:.6s}
    @keyframes ff{0%{transform:scaleX(0)}45%{transform:scaleX(1)}90%{transform:scaleX(1)}100%{transform:scaleX(0)}}
    .spark{width:100%;height:48px;margin-top:10px}
    .spark polyline{fill:none;stroke:#46e09a;stroke-width:2;filter:drop-shadow(0 0 4px rgba(70,224,154,.8));stroke-dasharray:200;stroke-dashoffset:200;animation:sk 4s ease-in-out infinite}
    @keyframes sk{0%{stroke-dashoffset:200}55%{stroke-dashoffset:0}90%{stroke-dashoffset:0}100%{stroke-dashoffset:200}}
    .big{font-family:'Anton';font-size:1.8rem;color:#fff;margin-top:2px}.big.g{color:var(--green)}
  </style>
</head>
<body class="v8" data-v="8">
  <div class="bg"></div>
  <main id="hero" class="hero">
    <div class="widget w1"><div class="k">Revenue by quarter</div><div class="bars"><i></i><i></i><i></i><i></i><i></i></div></div>
    <div class="widget w2"><div class="k">Pipeline funnel</div><div class="funnel"><div></div><div></div><div></div><div></div></div></div>
    <div class="widget w3"><div class="k">ARR · trailing</div><div class="big g">+14%</div><svg class="spark" viewBox="0 0 100 30" preserveAspectRatio="none"><polyline points="0,26 14,22 26,24 40,16 54,18 68,10 82,12 100,3"/></svg></div>
  </main>
  <section class="peek"><div class="in"><h2>Tell me where revenue stalled. I’ll tell you why.</h2><p>Hero concept only. Pick another from the bar up top. The winning direction gets carried across the whole page, keeping the current content, SEO and bilingual build.</p></div></section>
  <script src="/preview/shared.js"></script>
</body>
</html>
