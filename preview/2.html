<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2 · Orbit · Hero Preview | Tal Paperin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/preview/shared.css" />
  <style>
    .bg{position:fixed;inset:0;z-index:0;background:radial-gradient(120% 100% at 78% 50%,#0c1828 0%,#06080c 60%)}
    body.v2{}
    .v2 .photo-wrap{position:absolute;right:9%;top:50%;left:auto;transform:translateY(-50%);width:min(33vw,400px);height:min(33vw,400px);border-radius:50%;overflow:hidden;z-index:3;box-shadow:0 0 0 2px rgba(90,176,255,.4),0 30px 90px rgba(0,0,0,.65)}
    .v2 .photo-wrap .photo{object-position:50% 10%;filter:contrast(1.25) brightness(.9) saturate(1.05)}
    .v2 .fade{background:linear-gradient(90deg,#06080c 22%,rgba(6,8,12,.35) 46%,transparent 72%)}
    .orbit{position:absolute;right:9%;top:50%;transform:translateY(-50%);width:min(78vw,900px);height:min(78vw,900px);z-index:2;pointer-events:none}
    .ring{position:absolute;inset:0;margin:auto;border-radius:50%;border:1px solid rgba(90,176,255,.16)}
    .ring.r1{width:60%;height:60%;animation:orb 24s linear infinite}
    .ring.r2{width:80%;height:80%;animation:orb 40s linear infinite reverse}
    .ring.r3{width:100%;height:100%;animation:orb 58s linear infinite}
    @keyframes orb{to{transform:rotate(360deg)}}
    .chip{position:absolute;transform:translate(-50%,-50%)}
    .cc{}
    .r1 .cc{animation:ccw 24s linear infinite}
    .r2 .cc{animation:cw 40s linear infinite}
    .r3 .cc{animation:ccw 58s linear infinite}
    @keyframes ccw{to{transform:rotate(-360deg)}}
    @keyframes cw{to{transform:rotate(360deg)}}
    .chip b{display:inline-block;font:600 12px/1 'Space Grotesk';letter-spacing:.03em;white-space:nowrap;background:rgba(9,16,27,.85);border:1px solid rgba(90,176,255,.35);color:#cfe7ff;border-radius:999px;padding:7px 13px;box-shadow:0 6px 22px rgba(0,0,0,.45)}
    .chip.metric b{background:linear-gradient(90deg,var(--blue2),#3f97e6);color:#fff;border-color:transparent;font-weight:700;box-shadow:0 8px 26px rgba(31,111,178,.55)}
    .blip{position:absolute;width:9px;height:9px;border-radius:50%;background:var(--cyan);box-shadow:0 0 14px var(--cyan);transform:translate(-50%,-50%)}
  </style>
</head>
<body class="v2" data-v="2">
  <div class="bg"></div>
  <div class="grain"></div>
  <main id="hero" class="hero">
    <div class="orbit"><div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div></div>
  </main>
  <section class="peek"><div class="in"><h2>Tell me where revenue stalled. I’ll tell you why.</h2><p>Hero concept only. Pick another from the bar up top. The winning direction gets carried across the whole page, keeping the current content, SEO and bilingual build.</p></div></section>
  <script src="/preview/shared.js"></script>
  <script>
  (function(){
    var data={r1:['$20M ARR','30+ rebuilt','20+ yrs','4 continents'],
              r2:['Pipeline','Forecast','Quota','Distributors','GTM','Close'],
              r3:['B2B','B2G','RFQ','Margin','Channel','Negotiation','Market entry','Retention']};
    Object.keys(data).forEach(function(rk){
      var ring=document.querySelector('.ring.'+rk);if(!ring)return;var arr=data[rk],N=arr.length;
      arr.forEach(function(t,k){var a=2*Math.PI*k/N;var x=50+48*Math.cos(a),y=50+48*Math.sin(a);
        var d=document.createElement('div');d.className='chip'+(rk==='r1'?' metric':'');d.style.left=x+'%';d.style.top=y+'%';
        d.innerHTML='<div class="cc"><b>'+t+'</b></div>';ring.appendChild(d);
        var bl=document.createElement('div');bl.className='blip';bl.style.left=x+'%';bl.style.top=y+'%';ring.appendChild(bl);
      });
    });
  })();
  </script>
</body>
</html>
