<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>4 · Ticker · Hero Preview | Tal Paperin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/preview/shared.css" />
  <style>
    .bg{position:fixed;inset:0;z-index:0;background:radial-gradient(120% 100% at 75% 60%,#0b1626 0%,#06080c 60%)}
    .ticker{position:absolute;left:0;right:0;z-index:7;overflow:hidden;background:rgba(6,8,12,.62);backdrop-filter:blur(5px);border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:9px 0}
    .ticker.top{top:46px}.ticker.bottom{bottom:0}
    .tt{display:flex;white-space:nowrap;width:max-content;font:700 12px/1 'Space Grotesk';letter-spacing:.05em}
    .ticker.top .tt{animation:tk 30s linear infinite}
    .ticker.bottom .tt{animation:tk 38s linear infinite reverse}
    @keyframes tk{to{transform:translateX(-50%)}}
    .tt span{padding:0 22px;color:#88aacb}
    .tt .up{color:var(--green)}.tt .dn{color:#ff7a90}
    .chart{position:absolute;right:0;bottom:7%;width:64%;height:62%;z-index:1;opacity:.95}
    .chart .area{fill:url(#ag);opacity:0;animation:af 5.5s ease-in-out infinite}
    @keyframes af{0%{opacity:0}50%{opacity:.55}88%{opacity:.55}100%{opacity:0}}
    .chart .line{fill:none;stroke:url(#lg);stroke-width:1.1;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 5px rgba(90,176,255,.9));stroke-dasharray:300;stroke-dashoffset:300;animation:draw 5.5s ease-in-out infinite}
    @keyframes draw{0%{stroke-dashoffset:300}50%{stroke-dashoffset:0}88%{stroke-dashoffset:0}100%{stroke-dashoffset:300}}
    .chart .tip{fill:#fff;filter:drop-shadow(0 0 7px var(--cyan));animation:tp 5.5s ease-in-out infinite}
    @keyframes tp{0%,12%{opacity:0}50%,88%{opacity:1}100%{opacity:0}}
    .v4 .fade{background:linear-gradient(90deg,#06080c 24%,rgba(6,8,12,.5) 50%,rgba(6,8,12,.08) 74%,transparent 90%),linear-gradient(0deg,#06080c 2%,transparent 30%)}
  </style>
</head>
<body class="v4" data-v="4">
  <div class="bg"></div>
  <div class="grain"></div>
  <main id="hero" class="hero">
    <svg class="chart" viewBox="0 0 100 50" preserveAspectRatio="none">
      <defs>
        <linearGradient id="lg" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#1f6fb2"/><stop offset="1" stop-color="#2ce8ff"/></linearGradient>
        <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="rgba(90,176,255,.45)"/><stop offset="1" stop-color="rgba(90,176,255,0)"/></linearGradient>
      </defs>
      <polygon class="area" points="0,48 10,44 22,46 34,37 46,39 58,28 70,31 82,17 92,11 100,5 100,50 0,50"/>
      <polyline class="line" points="0,48 10,44 22,46 34,37 46,39 58,28 70,31 82,17 92,11 100,5"/>
      <circle class="tip" cx="100" cy="5" r="1.7"/>
    </svg>
    <div class="ticker top"><div class="tt" id="t1"></div></div>
    <div class="ticker bottom"><div class="tt" id="t2"></div></div>
  </main>
  <section class="peek"><div class="in"><h2>Tell me where revenue stalled. I’ll tell you why.</h2><p>Hero concept only. Pick another from the bar up top. The winning direction gets carried across the whole page, keeping the current content, SEO and bilingual build.</p></div></section>
  <script src="/preview/shared.js"></script>
  <script>
  (function(){
    var a=['ARR <b class="up">$20M ▲</b>','PIPELINE <b class="up">+38% ▲</b>','WIN RATE <b class="up">31% ▲</b>','CHURN <b class="dn">4% ▼</b>','QUOTA <b class="up">142% ▲</b>','DEALS <b class="up">18 ▲</b>','CAC <b class="dn">▼ 12%</b>','MARGIN <b class="up">+6pt ▲</b>'];
    var b=['ROMANIA <b class="up">OPEN ▲</b>','DISTRIBUTORS <b class="up">+7 ▲</b>','B2G <b class="up">RFQ WON ▲</b>','RAMP <b class="up">6wk ▲</b>','FORECAST <b class="up">CLEAN ▲</b>','RETENTION <b class="up">+9pt ▲</b>','EXPANSION <b class="up">$120k ▲</b>','APAC <b class="up">LIVE ▲</b>'];
    function fill(id,arr){var h='';for(var d=0;d<2;d++){arr.forEach(function(x){h+='<span>'+x+'</span>';});}document.getElementById(id).innerHTML=h;}
    fill('t1',a);fill('t2',b);
  })();
  </script>
</body>
</html>
