<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>6 · 3D Deck · Hero Preview | Tal Paperin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/preview/shared.css" />
  <style>
    .bg{position:fixed;inset:0;z-index:0;background:radial-gradient(120% 100% at 72% 40%,#0c1828 0%,#06080c 60%)}
    .v6 .photo-wrap{display:none}
    .stage{position:absolute;right:5%;top:50%;transform:translateY(-50%);width:min(46vw,580px);height:min(66vh,640px);z-index:2;perspective:1300px}
    .deck{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .12s ease-out;animation:deckin 1s cubic-bezier(.16,.84,.3,1)}
    @keyframes deckin{from{opacity:0;transform:rotateY(-22deg) translateZ(-120px)}to{opacity:1}}
    .card3d{position:absolute;border-radius:16px;box-shadow:0 30px 70px rgba(0,0,0,.6)}
    .pcard{left:4%;top:7%;width:62%;height:84%;overflow:hidden;border:1px solid rgba(90,176,255,.3)}
    .pcard img{width:100%;height:100%;object-fit:cover;object-position:50% 8%;filter:contrast(1.22) brightness(.9)}
    .uicard{width:46%;background:rgba(11,19,31,.92);backdrop-filter:blur(6px);border:1px solid rgba(90,176,255,.32);padding:15px 17px;font:600 12px/1.35 'Space Grotesk';color:#cfe7ff}
    .uicard .k{font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:#7fa6c8}
    .uicard .v{font-family:'Anton';font-size:1.7rem;color:#fff;margin-top:4px}
    .uicard .v.g{color:var(--green)}
    .u1{right:0;top:10%;transform:translateZ(50px);animation:fl1 6s ease-in-out infinite}
    .u2{right:6%;top:42%;transform:translateZ(110px);animation:fl2 7s ease-in-out infinite}
    .u3{right:-2%;top:72%;transform:translateZ(74px);animation:fl3 5.5s ease-in-out infinite}
    @keyframes fl1{0%,100%{transform:translateZ(50px) translateY(-7px)}50%{transform:translateZ(50px) translateY(7px)}}
    @keyframes fl2{0%,100%{transform:translateZ(110px) translateY(7px)}50%{transform:translateZ(110px) translateY(-7px)}}
    @keyframes fl3{0%,100%{transform:translateZ(74px) translateY(-5px)}50%{transform:translateZ(74px) translateY(6px)}}
    .mini{height:6px;border-radius:3px;background:rgba(255,255,255,.1);margin-top:8px;overflow:hidden}
    .mini i{display:block;height:100%;background:linear-gradient(90deg,#5ab0ff,#1f6fb2);width:30%;animation:filld 4s ease-in-out infinite}
    @keyframes filld{0%,100%{width:34%}50%{width:88%}}
    .v6 .fade{background:linear-gradient(90deg,#06080c 24%,rgba(6,8,12,.35) 52%,transparent 74%)}
  </style>
</head>
<body class="v6" data-v="6">
  <div class="bg"></div>
  <main id="hero" class="hero">
    <div class="stage" id="stage">
      <div class="deck" id="deck">
        <div class="card3d pcard"><img src="/tal-paperin.jpg" alt="Tal Paperin, Fractional CRO"></div>
        <div class="card3d uicard u1"><div class="k">Pipeline</div><div class="v">$1.2M</div><div class="mini"><i></i></div></div>
        <div class="card3d uicard u2"><div class="k">Deal · Closed Won</div><div class="v g">+$48k</div></div>
        <div class="card3d uicard u3"><div class="k">Quota attainment</div><div class="v">142%</div></div>
      </div>
    </div>
  </main>
  <section class="peek"><div class="in"><h2>Tell me where revenue stalled. I’ll tell you why.</h2><p>Hero concept only. Pick another from the bar up top. The winning direction gets carried across the whole page, keeping the current content, SEO and bilingual build.</p></div></section>
  <script src="/preview/shared.js"></script>
  <script>
  (function(){
    document.body.classList.add('nopar');
    if(window.PV_REDUCE||!window.PV_FINE)return;
    var stage=document.getElementById('stage'),deck=document.getElementById('deck');
    stage.addEventListener('pointermove',function(e){var r=stage.getBoundingClientRect();var px=(e.clientX-r.left)/r.width-.5,py=(e.clientY-r.top)/r.height-.5;deck.style.transform='rotateY('+(px*20)+'deg) rotateX('+(-py*20)+'deg)';});
    stage.addEventListener('pointerleave',function(){deck.style.transform='';});
  })();
  </script>
</body>
</html>
