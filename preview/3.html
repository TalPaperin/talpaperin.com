  <style>
    .bg{position:fixed;inset:0;z-index:0;background:radial-gradient(120% 100% at 68% 30%,#0a1320 0%,#06080c 62%)}
    #net{position:absolute;inset:0;z-index:1;width:100%;height:100%}
    .v3 .photo-wrap{mix-blend-mode:luminosity;opacity:.92}
    .v3 .fade{background:linear-gradient(90deg,#06080c 24%,rgba(6,8,12,.5) 50%,rgba(6,8,12,.08) 72%,transparent 88%),linear-gradient(0deg,#06080c 2%,transparent 34%)}

<body class="v3" data-v="3">
  <div class="bg"></div>
  <main id="hero" class="hero"><canvas id="net"></canvas></main>
  <section class="peek"><div class="in"><h2>Tell me where revenue stalled. I’ll tell you why.</h2><p>Hero concept only. Pick another from the bar up top. The winning direction gets carried across the whole page, keeping the current content, SEO and bilingual build.</p></div></section>
  <script src="/preview/shared.js"></script>
  <script>
  (function(){
    var cv=document.getElementById('net'),ctx=cv.getContext('2d'),DPR=Math.min(devicePixelRatio||1,2),W,H,pts=[],labels=['LEAD','MQL','SQL','DEAL','WON'],m={x:-999,y:-999};
    function size(){W=cv.clientWidth;H=cv.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
    function init(){pts=[];var n=Math.min(72,Math.round(W*H/13000));for(var i=0;i<n;i++){pts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.45,vy:(Math.random()-.5)*.45,r:Math.random()*1.6+.7,lab:i<labels.length?labels[i]:null});}}
    size();init();
    addEventListener('resize',function(){size();init();},{passive:true});
    addEventListener('pointermove',function(e){var r=cv.getBoundingClientRect();m.x=e.clientX-r.left;m.y=e.clientY-r.top;},{passive:true});
    var reduce=window.PV_REDUCE;
    function frame(){
      ctx.clearRect(0,0,W,H);
      for(var i=0;i<pts.length;i++){var p=pts[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;var dx=m.x-p.x,dy=m.y-p.y,d=Math.hypot(dx,dy)||1;if(d<170){p.vx+=dx/d*.02;p.vy+=dy/d*.02;}p.vx*=.99;p.vy*=.99;}
      for(var i=0;i<pts.length;i++)for(var j=i+1;j<pts.length;j++){var a=pts[i],b=pts[j],dx=a.x-b.x,dy=a.y-b.y,d=Math.hypot(dx,dy);if(d<128){ctx.strokeStyle='rgba(90,176,255,'+(.16*(1-d/128))+')';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}}
      for(var i=0;i<pts.length;i++){var p=pts[i],d=Math.hypot(m.x-p.x,m.y-p.y);if(d<175){ctx.strokeStyle='rgba(44,232,255,'+(.32*(1-d/175))+')';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(m.x,m.y);ctx.lineTo(p.x,p.y);ctx.stroke();}}
      for(var i=0;i<pts.length;i++){var p=pts[i];if(p.lab){ctx.fillStyle='#5ab0ff';ctx.shadowColor='#5ab0ff';ctx.shadowBlur=14;ctx.beginPath();ctx.arc(p.x,p.y,4.5,0,7);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='rgba(207,231,255,.92)';ctx.font='700 11px Space Grotesk';ctx.fillText(p.lab,p.x+9,p.y+4);}else{ctx.fillStyle='rgba(154,167,181,.65)';ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();}}
      if(!reduce)requestAnimationFrame(frame);
    }
    frame();
  })();
  </script>
</body>
</html>
