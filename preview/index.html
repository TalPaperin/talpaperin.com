<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>1 · Glitch · Hero Preview | Tal Paperin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/preview/shared.css" />
  <style>
    .bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:radial-gradient(130% 90% at 75% 10%,#0c1726 0%,#06080c 55%)}
    .aurora{position:absolute;inset:-25%;filter:blur(70px);opacity:.7}
    .aurora span{position:absolute;display:block;border-radius:50%;mix-blend-mode:screen}
    .aurora .a1{width:48vw;height:48vw;left:4%;top:2%;background:radial-gradient(circle,#1f6fb2,transparent 60%);animation:d1 12s ease-in-out infinite}
    .aurora .a2{width:42vw;height:42vw;right:0;top:14%;background:radial-gradient(circle,#36a0ff,transparent 60%);animation:d2 14s ease-in-out infinite}
    .aurora .a3{width:40vw;height:40vw;left:30%;bottom:-12%;background:radial-gradient(circle,#0e3f70,transparent 58%);animation:d3 16s ease-in-out infinite}
    @keyframes d1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(14%,10%) scale(1.25)}}
    @keyframes d2{0%,100%{transform:translate(0,0) scale(1.1)}50%{transform:translate(-12%,14%) scale(.9)}}
    @keyframes d3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(10%,-12%) scale(1.2)}}
    .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(120,190,255,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(120,190,255,.07) 1px,transparent 1px);background-size:54px 54px;animation:gridmove 6s linear infinite;-webkit-mask-image:radial-gradient(85% 75% at 45% 40%,#000 30%,transparent 80%);mask-image:radial-gradient(85% 75% at 45% 40%,#000 30%,transparent 80%)}
    @keyframes gridmove{to{background-position:54px 54px}}
    .glow-ring{position:absolute;right:-6%;top:50%;width:82vh;height:82vh;transform:translateY(-50%);z-index:1;border-radius:50%;background:conic-gradient(from 0deg,transparent,rgba(90,176,255,.35),transparent 38%,rgba(63,151,230,.4),transparent 72%,rgba(44,232,255,.25),transparent);filter:blur(34px);animation:spin 9s linear infinite}
    @keyframes spin{to{transform:translateY(-50%) rotate(360deg)}}
    .v1 .photo-wrap{clip-path:inset(0 0 0 100%);animation:wipe 1.1s cubic-bezier(.7,0,.2,1) .15s forwards}
    @keyframes wipe{to{clip-path:inset(0 0 0 0)}}
    .v1 .photo-wrap .photo{animation:glitchimg 5.5s infinite}
    @keyframes glitchimg{0%,90%,100%{clip-path:inset(0 0 0 0);transform:translate(0,0)}91%{clip-path:inset(8% 0 62% 0);transform:translate(-12px,0);filter:contrast(1.6) brightness(.9) hue-rotate(25deg)}92.5%{clip-path:inset(54% 0 22% 0);transform:translate(14px,0)}94%{clip-path:inset(34% 0 44% 0);transform:translate(-8px,0)}95.5%{clip-path:inset(0 0 0 0);transform:translate(0,0)}}
    .v1 .photo-wrap::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,.22) 0,rgba(0,0,0,.22) 1px,transparent 2px,transparent 4px);background-size:100% 4px;mix-blend-mode:multiply;opacity:.55;animation:lines 6s linear infinite;pointer-events:none}
    @keyframes lines{to{background-position:0 4px}}
    .scanbar{position:absolute;left:0;right:0;height:160px;top:-160px;z-index:4;pointer-events:none;background:linear-gradient(180deg,transparent,rgba(90,176,255,.12),rgba(44,232,255,.06),transparent);animation:scan 4.5s linear infinite}
    @keyframes scan{to{top:120%}}
    .v1 .name::before,.v1 .name::after{content:attr(data-text);position:absolute;left:0;top:0;width:100%;height:100%;overflow:hidden;pointer-events:none}
    .v1 .name::before{color:var(--cyan);animation:gA 5.5s infinite linear}
    .v1 .name::after{color:var(--hot);animation:gB 5.5s infinite linear}
    @keyframes gA{0%,88%,100%{clip-path:inset(0 0 100% 0);transform:translate(0,0);opacity:0}89%{opacity:.85;clip-path:inset(8% 0 66% 0);transform:translate(-7px,-2px)}92%{clip-path:inset(48% 0 22% 0);transform:translate(6px,2px)}95%{clip-path:inset(78% 0 6% 0);transform:translate(-4px,0)}96%{opacity:0}}
    @keyframes gB{0%,88%,100%{clip-path:inset(0 0 100% 0);transform:translate(0,0);opacity:0}89.5%{opacity:.85;clip-path:inset(20% 0 54% 0);transform:translate(7px,2px)}93%{clip-path:inset(62% 0 12% 0);transform:translate(-6px,-2px)}96%{opacity:0}}
  </style>
</head>
<body class="v1" data-v="1">
  <div class="bg"><div class="aurora"><span class="a1"></span><span class="a2"></span><span class="a3"></span></div><div class="grid"></div></div>
  <div class="grain"></div>
  <main id="hero" class="hero">
    <div class="glow-ring"></div>
    <div class="scanbar"></div>
  </main>
  <section class="peek"><div class="in"><h2>Tell me where revenue stalled. I’ll tell you why.</h2><p>Hero concept only. Pick another from the bar up top. The winning direction gets carried across the whole page, keeping the current content, SEO and bilingual build.</p></div></section>
  <script src="/preview/shared.js"></script>
</body>
</html>
