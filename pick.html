<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Tal Paperin , Custom Hero Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter Tight',system-ui,sans-serif;background:#0b0f14;color:#fff}
  .tag{position:fixed;top:18px;left:18px;z-index:50;background:#000;color:#fff;font:700 13px/1 'Inter Tight';padding:9px 14px;border-radius:999px;box-shadow:0 6px 20px rgba(0,0,0,.5)}
  .tag b{color:#5ab0ff}

  .hero{position:relative;min-height:100vh;display:flex;align-items:center;overflow:hidden;background:#0a0e13}

  /* photo anchored LEFT (face on the left side) */
  .hero .photo{position:absolute;top:0;left:0;height:100%;width:62%;object-fit:cover;object-position:50% 16%;z-index:1;filter:brightness(.46) contrast(1.06) saturate(1.05)}

  /* fade so the RIGHT side holds text, with an overall darkening */
  .hero .fade{position:absolute;inset:0;z-index:3;pointer-events:none;background:
     linear-gradient(0deg,rgba(8,11,16,.55),rgba(8,11,16,.55)),
     linear-gradient(90deg, rgba(8,11,16,.5) 0%, rgba(8,11,16,.32) 22%, rgba(8,11,16,.5) 44%, rgba(8,11,16,.88) 60%, #080b10 70%, #080b10 100%),
     linear-gradient(0deg,#080b10 0%, rgba(8,11,16,.3) 24%, transparent 54%)}

  /* #1 aurora blobs */
  .hero .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5;mix-blend-mode:screen;z-index:2;animation:float 16s ease-in-out infinite}
  .hero .b1{width:540px;height:540px;background:#1f6fb2;top:-140px;left:-120px}
  .hero .b2{width:460px;height:460px;background:#0fb5a6;bottom:-160px;left:8%;animation-delay:-5s}
  .hero .b3{width:520px;height:520px;background:#2747b0;top:18%;left:24%;animation-delay:-9s;opacity:.4}
  @keyframes float{50%{transform:translate(50px,30px) scale(1.14)}}

  /* #7 particle canvas, upper-left corner */
  .hero canvas{position:absolute;top:0;left:0;width:62%;height:66%;z-index:2;opacity:.75;
     -webkit-mask-image:radial-gradient(120% 120% at top left,#000 40%,transparent 78%);
     mask-image:radial-gradient(120% 120% at top left,#000 40%,transparent 78%)}

  .content{position:relative;z-index:5;width:100%;max-width:1280px;margin:0 auto;padding:0 40px;display:flex}
  .text{width:52%;min-width:440px;margin-left:auto;text-align:left}
  .text>*{margin-left:0}
  .kicker{font:600 14px/1 'Inter Tight';letter-spacing:.18em;text-transform:uppercase;color:#9fc6e8;margin-bottom:20px}
  .kicker b{color:#fff}
  h1{font-family:'Anton';font-weight:400;font-size:clamp(2.3rem,4.8vw,4.4rem);line-height:.98;letter-spacing:.015em;text-transform:uppercase;color:#fff;text-shadow:0 4px 30px rgba(0,0,0,.55)}
  .sub{font-family:'Anton';font-weight:400;font-size:clamp(1.35rem,2.6vw,2.15rem);text-transform:uppercase;color:#e7eef5;margin-top:18px;letter-spacing:.015em}
  .u{position:relative;display:inline-block;color:#fff}
  .u::after{content:"";position:absolute;left:0;bottom:.02em;height:.15em;width:100%;border-radius:2px;
     background:linear-gradient(90deg,#1f6fb2,#5ab0ff);transform:scaleX(0);transform-origin:left;
     animation:sweep 3.4s cubic-bezier(.7,0,.3,1) infinite}
  @keyframes sweep{0%,10%{transform:scaleX(0);transform-origin:left}42%,66%{transform:scaleX(1);transform-origin:left}67%{transform-origin:right}100%{transform:scaleX(0);transform-origin:right}}

  .stats{display:flex;gap:14px 40px;margin-top:34px;flex-wrap:wrap}
  .stat b{font-family:'Anton';font-weight:400;font-size:2.2rem;color:#5ab0ff;display:block;line-height:1}
  .stat span{font-size:.95rem;color:#b9c6d3}
  .cta{display:flex;gap:14px;margin-top:34px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;font:700 15px/1 'Inter Tight';padding:16px 28px;border-radius:11px;text-decoration:none;cursor:pointer;transition:.2s}
  .btn.p{background:linear-gradient(90deg,#1f6fb2,#3f97e6);color:#fff;box-shadow:0 14px 34px rgba(31,111,178,.45)}
  .btn.p:hover{transform:translateY(-2px)}
  .btn.s{border:1px solid rgba(255,255,255,.35);color:#fff}
  .btn.s:hover{background:rgba(255,255,255,.1)}

  @media(max-width:900px){
    .hero .photo{width:100%;object-position:50% 14%}
    .text{width:100%;min-width:0;margin-left:0}
  }
  @media(max-width:680px){
    .hero{align-items:flex-end;padding-bottom:9vh;min-height:96vh}
    .hero .fade{background:linear-gradient(0deg,#0a0e13 0%, rgba(10,14,19,.93) 44%, rgba(10,14,19,.55) 70%, rgba(10,14,19,.15) 100%)}
  }
  @media(prefers-reduced-motion:reduce){.blob,.u::after{animation:none}.u::after{transform:scaleX(1)}}
</style>
</head>
<body>
<div class="tag">Custom hero · <b>your combination</b></div>

<section class="hero">
  <img class="photo" src="/tal-paperin.jpg" alt="Tal Paperin, Fractional CRO and Business Consultant" />
  <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
  <canvas id="cv"></canvas>
  <div class="fade"></div>

  <div class="content">
    <div class="text">
      <p class="kicker"><b>Tal Paperin</b> &nbsp;·&nbsp; Fractional CRO + Business Consultant</p>
      <h1>Your sales suck.<br>You don't know why.<br>I do.</h1>
      <p class="sub">And I'll fix it in <span class="u">under 90 days.</span></p>
      <div class="stats">
        <div class="stat"><b>30+</b><span>B2B companies rebuilt</span></div>
        <div class="stat"><b>$20M</b><span>ARR managed last year</span></div>
      </div>
      <div class="cta">
        <a class="btn p" href="#">Book a Call</a>
        <a class="btn s" href="#">See the Work</a>
      </div>
    </div>
  </div>
</section>

<script>
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),W,H,pts;
  function rs(){W=cv.width=cv.offsetWidth;H=cv.height=cv.offsetHeight;pts=[];for(var i=0;i<64;i++)pts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.45,vy:(Math.random()-.5)*.45});}
  function draw(){ctx.clearRect(0,0,W,H);for(var i=0;i<pts.length;i++){var p=pts[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;ctx.fillStyle='rgba(90,176,255,.9)';ctx.beginPath();ctx.arc(p.x,p.y,1.5,0,7);ctx.fill();for(var j=i+1;j<pts.length;j++){var q=pts[j],dx=p.x-q.x,dy=p.y-q.y,d=Math.sqrt(dx*dx+dy*dy);if(d<115){ctx.strokeStyle='rgba(120,170,255,'+(.18*(1-d/115))+')';ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.stroke();}}}requestAnimationFrame(draw);}
  rs();draw();window.addEventListener('resize',rs);
</script>
</body>
</html>
